<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mi_calli Admin UI</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 1.5rem; max-width: 960px; margin: auto; }
      h1, h2, h3 { margin-top: 0; }
      form { display: grid; gap: 0.75rem; margin-bottom: 1rem; max-width: 420px; }
      input, select, button { padding: 0.5rem; font-size: 1rem; }
      .card { border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; }
      .message { color: #b33; font-weight: bold; }
    </style>
  </head>
  <body>
    <div id="message" class="message"></div>

    <section id="login-section" class="card">
      <h2>Login or Register (admin)</h2>
      <form id="login-form" style="margin-bottom:0.75rem;">
        <label for="login-select">Login as admin:</label>
        <select id="login-select"><option value="">-- choose admin --</option></select>
        <button id="login-button" type="button">Login</button>
      </form>

      <form id="register-form">
        <h3>Register new admin</h3>
        <input id="reg-username" placeholder="Admin username" required />
        <input id="reg-email" type="email" placeholder="Admin email" required />
        <input id="reg-password" type="password" placeholder="Admin password" required />
        <button type="submit">Register & Enter dashboard</button>
      </form>
    </section>

    <section id="dashboard-section" class="card" style="display:none;">
      <h2>Admin dashboard</h2>
      <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem;">
        <div>Logged in as <strong id="current-admin-name"></strong></div>
        <button id="logout-button" type="button">Logout</button>
        <button id="refresh-button" type="button">Refresh data</button>
      </div>

      <div id="dashboard">
        <form id="property-form">
          <h3>Create property</h3>
          <input id="property-name" placeholder="Property name" required />
          <input id="property-address" placeholder="Address" required />
          <input id="property-image" placeholder="Image URL (optional)" />
          <button type="submit">Create property</button>
        </form>
        <form id="tenant-form">
          <h3>Create tenant</h3>
          <input id="tenant-username" placeholder="Tenant username" required />
          <input id="tenant-email" type="email" placeholder="Tenant email" required />
          <input id="tenant-password" type="password" placeholder="Tenant password" required />
          <select id="property-select" required>
            <option value="">-- select property --</option>
          </select>
          <button type="submit">Create tenant</button>
        </form>
      </div>
    </section>

    <section class="card">
      <h2>Current properties</h2>
      <div id="properties-list">Loading...</div>
    </section>
    <script src="app.js"></script>
  </body>
</html>
